<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krienen Lab Data Logger v2</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any" type="image/x-icon">

    <style>
        :root {
            --primary-color: #0078d7;
            --primary-hover: #106ebe;
            --success-color: #107c10;
            --danger-color: #d32f2f;
            --bg-color: #f5f5f5;
            --container-bg: #ffffff;
            --border-color: #ddd;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: var(--bg-color); color: #333; }
        
        /* Badges & Pills */
        .counter-badge {
            position: fixed; top: 20px; right: 20px; background: var(--primary-color); color: white; border: none;
            border-radius: 20px; padding: 8px 16px; font-size: 14px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); transition: all 0.3s ease; z-index: 1000;
        }
        .counter-badge:hover { background: var(--primary-hover); transform: scale(1.05); }
        .user-pill {
            position: fixed; top: 20px; left: 20px; background: #e9ecef; color: #333; border-radius: 20px;
            padding: 6px 12px; font-size: 12px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer; z-index: 1000;
        }

        .header { background-color: var(--primary-color); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        
        .container { max-width: 900px; margin: 0 auto; background-color: var(--container-bg); padding: 25px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }

        /* Tabs */
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; gap: 5px; }
        .tab { background-color: #f8f9fa; border: 1px solid var(--border-color); border-bottom: none; padding: 10px 20px; cursor: pointer; border-radius: 6px 6px 0 0; font-weight: 500; font-size: 14px; transition: all 0.2s ease; }
        .tab:hover { background-color: #e9ecef; }
        .tab.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .tab-content { display: none; padding: 10px 0; }
        .tab-content.active { display: block; }

        /* Form */
        .form-row { display: grid; grid-template-columns: 220px 1fr; gap: 15px; align-items: center; margin-bottom: 15px; }
        label { font-weight: 500; font-size: 14px; }
        input, select, textarea { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: var(--primary-color); ring: 2px rgba(0, 120, 215, 0.2); }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success-color); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border-color); font-size: 12px; padding: 6px 12px; }
        .btn-outline:hover { background: #f8f9fa; }

        .button-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .save-controls { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 6px; }
        .status-text { font-size: 12px; color: #666; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; gap: 5px; }
            .tabs { flex-wrap: wrap; }
            .tab { flex: 1 1 40%; text-align: center; }
        }
    </style>
</head>
<body>
    <div id="user-pill" class="user-pill" onclick="changeUserName()">User: —</div>
    <button id="counter-badge" class="counter-badge" onclick="editCounter()">Chip: ?</button>

    <div class="header">
        <h1>Krienen Lab Data Logger</h1>
    </div>

    <div class="container">
        <div class="save-controls">
            <button type="button" onclick="saveLocal()" class="btn btn-outline">💾 Save Local</button>
            <button type="button" onclick="loadLocal()" class="btn btn-outline">📁 Load Local</button>
            <button type="button" onclick="clearLocal()" class="btn btn-outline">🗑️ Clear</button>
            <span id="save-status" class="status-text">Auto-save active</span>
        </div>

        <form id="dataForm" onsubmit="return handleFormSubmit(event)">
            <input type="hidden" name="user_first_name" id="user_first_name">

            <div class="tabs">
                <div class="tab active" onclick="showTab('tissue', event)">Tissue</div>
                <div class="tab" onclick="showTab('facs', event)">FACS</div>
                <div class="tab" onclick="showTab('cdna', event)">cDNA</div>
                <div class="tab" onclick="showTab('libraries', event)">Libraries</div>
            </div>

            <!-- Tab: Tissue -->
            <div id="tissue" class="tab-content active">
                <div class="form-row">
                    <label>Project:</label>
                    <select name="project" id="project" onchange="toggleProjectUI()">
                        <option value="HMBA_CjAtlas_Subcortex">HMBA_CjAtlas_Subcortex</option>
                        <option value="HMBA_CjAtlas_Cortex">HMBA_CjAtlas_Cortex</option>
                        <option value="HMBA_Aim4">HMBA_Aim4</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-row" id="project-name-row" style="display: none;">
                    <label>Specific Project Name:</label>
                    <input type="text" name="project_name">
                </div>
                <div class="form-row">
                    <label>Date (YYMMDD):</label>
                    <input type="text" name="date" placeholder="YYMMDD" required>
                </div>
                <div class="form-row">
                    <label>Marmoset:</label>
                    <select name="marmoset" required>
                        <option value="">-- Select --</option>
                        {% for name in marmosets %}
                        <option value="{{ name }}">{{ name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-row">
                    <label>Hemisphere:</label>
                    <select name="hemisphere" required>
                        <option value="Left (LH)">Left (LH)</option>
                        <option value="Right (RH)">Right (RH)</option>
                        <option value="Both">Both</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Location (BS/CX/CB):</label>
                    <select name="tile_location" required>
                        <option value="BS">BS</option>
                        <option value="CX">CX</option>
                        <option value="CB">CB</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Slab(s):</label>
                    <input type="text" name="slab" placeholder="e.g. 09 or 09,10" required>
                </div>
                <div class="form-row">
                    <label>Tile:</label>
                    <input type="text" name="tile" placeholder="e.g. 22" required>
                </div>
                <div class="form-row">
                    <label>eLab Link:</label>
                    <input type="url" name="elab_link" placeholder="Paste link here">
                </div>
            </div>

            <!-- Tab: FACS -->
            <div id="facs" class="tab-content">
                <div class="form-row">
                    <label>Your Initials:</label>
                    <input type="text" name="sorter_initials" placeholder="e.g. JD" required>
                </div>
                <div class="form-row">
                    <label>Sort Method:</label>
                    <select name="sort_method" id="sort_method" onchange="updateFacsDefaults()" required>
                        <option value="pooled">pooled</option>
                        <option value="unsorted">unsorted</option>
                        <option value="DAPI">DAPI</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Population Details:</label>
                    <input type="text" name="facs_population" id="facs_population" placeholder="e.g. 70/20/10">
                </div>
                <div class="form-row">
                    <label>Num Reactions:</label>
                    <input type="number" name="rxn_number" min="1" required>
                </div>
                <div class="form-row">
                    <label>Expected Recovery:</label>
                    <input type="number" name="expected_recovery">
                </div>
                <div class="form-row">
                    <label>Nuclei Conc (per µL):</label>
                    <input type="number" step="0.01" name="nuclei_concentration">
                </div>
                <div class="form-row">
                    <label>Nuclei Vol (µL):</label>
                    <input type="number" step="0.01" name="nuclei_volume">
                </div>
            </div>

            <!-- Tab: cDNA -->
            <div id="cdna" class="tab-content">
                <div class="form-row">
                    <label>cDNA Amp Date:</label>
                    <input type="text" name="cdna_amp_date" placeholder="YYMMDD">
                </div>
                <div class="form-row">
                    <label>cDNA PCR Cycles:</label>
                    <input type="text" name="cdna_pcr_cycles" placeholder="Comma-sep if multiple">
                </div>
                <div class="form-row">
                    <label>cDNA Conc (ng/µL):</label>
                    <input type="text" name="cdna_concentration" placeholder="Comma-sep if multiple">
                </div>
                <div class="form-row">
                    <label>Percent cDNA > 400bp:</label>
                    <input type="text" name="percent_cdna_400bp" placeholder="Comma-sep if multiple">
                </div>
            </div>

            <!-- Tab: Libraries -->
            <div id="libraries" class="tab-content">
                <div class="form-row">
                    <label>RNA Prep Date:</label>
                    <input type="text" name="rna_prep_date" placeholder="YYMMDD">
                </div>
                <div class="form-row">
                    <label>RNA Indices:</label>
                    <input type="text" name="rna_indices" placeholder="e.g. A1, B2">
                </div>
                <div class="form-row">
                    <label>RNA Lib Conc (ng/µL):</label>
                    <input type="text" name="rna_lib_concentration" placeholder="Comma-sep">
                </div>
                <div class="form-row">
                    <label>RNA Sizes (bp):</label>
                    <input type="text" name="rna_sizes" placeholder="Comma-sep">
                </div>
                <div class="form-row">
                    <label>RNA Lib Cycles:</label>
                    <input type="text" name="library_cycles_rna" placeholder="Comma-sep">
                </div>
                <hr>
                <div class="form-row">
                    <label>ATAC Prep Date:</label>
                    <input type="text" name="atac_prep_date" class="atac-field" placeholder="YYMMDD">
                </div>
                <div class="form-row">
                    <label>ATAC Indices:</label>
                    <input type="text" name="atac_indices" class="atac-field" placeholder="e.g. D4, E5">
                </div>
                <div class="form-row">
                    <label>ATAC Lib Conc (ng/µL):</label>
                    <input type="text" name="atac_lib_concentration" class="atac-field" placeholder="Comma-sep">
                </div>
                <div class="form-row">
                    <label>ATAC Sizes (bp):</label>
                    <input type="text" name="atac_sizes" class="atac-field" placeholder="Comma-sep">
                </div>
                <div class="form-row">
                    <label>ATAC Lib Cycles:</label>
                    <input type="text" name="library_cycles_atac" class="atac-field" placeholder="Comma-sep">
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">📊 Submit Data</button>
                <button type="button" class="btn btn-success" onclick="downloadExcel()">📥 Download Excel</button>
            </div>
        </form>
    </div>

    <script>
        // --- Setup & User State ---
        function getUsername() {
            return localStorage.getItem('user_first_name') || '';
        }

        function checkUser() {
            let name = getUsername();
            if (!name) {
                name = prompt('Enter your first name for file naming:');
                if (name && name.trim()) {
                    localStorage.setItem('user_first_name', name.trim());
                }
            }
            updateUserUI();
            return name;
        }

        function updateUserUI() {
            const name = getUsername();
            document.getElementById('user-pill').textContent = 'User: ' + (name || '—');
            document.getElementById('user_first_name').value = name;
            if (name) loadCounter();
        }

        function changeUserName() {
            const current = getUsername();
            const next = prompt('Change user name:', current);
            if (next !== null && next.trim()) {
                localStorage.setItem('user_first_name', next.trim());
                updateUserUI();
            }
        }

        // --- Tabs ---
        function showTab(id, event) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
        }

        // --- Form Logic ---
        function toggleProjectUI() {
            const proj = document.getElementById('project').value;
            document.getElementById('project-name-row').style.display = (proj === 'Other' ? 'grid' : 'none');
            
            const isAim4 = (proj === 'HMBA_Aim4');
            document.querySelectorAll('.atac-field').forEach(f => {
                f.disabled = isAim4;
                if (isAim4) f.value = '';
            });
        }

        function updateFacsDefaults() {
            const method = document.getElementById('sort_method').value;
            const pop = document.getElementById('facs_population');
            if (method === 'unsorted') { pop.value = 'no_FACS'; pop.disabled = true; }
            else if (method === 'DAPI') { pop.value = 'DAPI'; pop.disabled = true; }
            else { pop.disabled = false; pop.placeholder = 'e.g. 70/20/10'; }
        }

        // --- Data Persistence ---
        function saveLocal() {
            const data = {};
            new FormData(document.getElementById('dataForm')).forEach((v, k) => data[k] = v);
            localStorage.setItem('krienen_draft', JSON.stringify(data));
            showStatus('Saved local draft');
        }

        function loadLocal() {
            const saved = localStorage.getItem('krienen_draft');
            if (!saved) return;
            const data = JSON.parse(saved);
            const form = document.getElementById('dataForm');
            Object.keys(data).forEach(k => {
                const el = form.elements[k];
                if (el) el.value = data[k];
            });
            toggleProjectUI();
            updateFacsDefaults();
            showStatus('Loaded draft');
        }

        function clearLocal() {
            localStorage.removeItem('krienen_draft');
            document.getElementById('dataForm').reset();
            toggleProjectUI();
            showStatus('Form cleared');
        }

        function showStatus(msg) {
            const el = document.getElementById('save-status');
            el.textContent = msg;
            setTimeout(() => el.textContent = 'Auto-save active', 3000);
        }

        // --- API Calls ---
        async function loadCounter() {
            try {
                const res = await fetch(`/get_counter?user=${getUsername()}`);
                const data = await res.json();
                document.getElementById('counter-badge').textContent = 'Chip: ' + (data.next_counter || '?');
            } catch(e) {}
        }

        async function editCounter() {
            const name = checkUser();
            if (!name) return;
            const val = prompt('Enter most recent chip number used:');
            if (val === null) return;
            const num = parseInt(val);
            if (isNaN(num)) return alert('Invalid number');

            const res = await fetch('/update_counter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_first_name: name, new_counter: num })
            });
            if ((await res.json()).success) loadCounter();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const name = checkUser();
            if (!name) return;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const data = {};
            new FormData(e.target).forEach((v, k) => data[k] = v);

            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('Success!');
                    clearLocal();
                    loadCounter();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch(err) {
                alert('Network error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📊 Submit Data';
            }
        }

        function downloadExcel() {
            const name = checkUser();
            if (name) window.location.href = `/download?user=${encodeURIComponent(name)}`;
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            checkUser();
            loadLocal();
            // Auto-save every 30s
            setInterval(saveLocal, 30000);
        });
    </script>
</body>
</html>
